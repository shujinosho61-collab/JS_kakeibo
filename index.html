<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="J's Kakeibo">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/000000/wallet.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/000000/wallet.png">
    
    <title>J's Kakeibo</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .custom-spinner {
            width: 32px; height: 32px; border: 3px solid #f1f5f9; border-top: 3px solid #0f172a;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0; position: absolute; width: 100%; height: 100%; cursor: pointer; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef, createElement } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            const [transactions, setTransactions] = useState([]);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [error, setError] = useState(null);
            const [isReady, setIsReady] = useState(false);
            const [storedApiKey, setStoredApiKey] = useState((localStorage.getItem('gemini_api_key') || '').trim());
            const camRef = useRef(null);
            const fileRef = useRef(null);
            
            const [form, setForm] = useState({ date: new Date().toISOString().split('T')[0], item: '', amount: '', category: '食費', type: 'expense' });
            const categories = ['食費', '日用品', '交際費', '交通費', '給与', '振替', 'その他'];
            const categoryColors = { '食費': '#1e293b', '日用品': '#475569', '交際費': '#6366f1', '交通費': '#0f172a', '振替': '#94a3b8', 'その他': '#cbd5e1' };

            useEffect(() => {
                const init = async () => {
                    try {
                        const configStr = window.__firebase_config;
                        if (!configStr || configStr === '{}' || configStr === 'undefined') {
                            setIsReady(true); return;
                        }
                        const config = JSON.parse(configStr);
                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        window.db = db;
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => { setUser(u); setIsReady(true); });
                        onSnapshot(collection(db, 'artifacts', window.__app_id || 'js-kakeibo-v1', 'users', auth.currentUser.uid, 'transactions'), (snap) => {
                            setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => new Date(b.date) - new Date(a.date)));
                        });
                    } catch (e) { setIsReady(true); }
                };
                init();
            }, []);

            useEffect(() => { if (window.lucide) lucide.createIcons(); });

            const processFile = async (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const base64 = e.target.result.split(',')[1];
                        if (file.type === "application/pdf") {
                            resolve({ mimeType: "application/pdf", data: base64 });
                            return;
                        }
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 1000;
                            let width = img.width, height = img.height;
                            if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                            else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                            canvas.width = width; canvas.height = height;
                            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                            resolve({ mimeType: "image/jpeg", data: canvas.toDataURL('image/jpeg', 0.8).split(',')[1] });
                        };
                    };
                    reader.onerror = reject;
                });
            };

            const onFileChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const apiKey = storedApiKey.trim();
                if (!apiKey && !window.__firebase_config) {
                    setError("APIキーをSTATSタブから設定してください。");
                    return;
                }

                setIsAnalyzing(true); setError(null);
                try {
                    const fileData = await processFile(file);
                    
                    // 最も安定している「v1」エンドポイントと「gemini-1.5-flash」を使用
                    const apiUrl = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                    
                    const res = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [
                                { text: "家計簿解析。画像から「合計金額(amount)」「日付(date:YYYY-MM-DD)」「店舗名/項目(item)」をJSONで。カテゴリー:食費,日用品,交際費,交通費,振替,その他。JSON以外の文字は不要。\n{\"date\": \"YYYY-MM-DD\", \"item\": \"string\", \"amount\": number, \"category\": \"string\"}" },
                                { inlineData: { mimeType: fileData.mimeType, data: fileData.data } }
                            ] }]
                        })
                    });

                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.error?.message || `通信エラー(${res.status})`);
                    }
                    
                    const json = await res.json();
                    const resultText = json.candidates[0].content.parts[0].text;
                    const data = JSON.parse(resultText.replace(/```json|```/g, '').trim());
                    setForm({ ...data, type: 'expense' });
                } catch (err) { 
                    setError(`解析エラー: ${err.message}`); 
                } finally { 
                    setIsAnalyzing(false); e.target.value = ''; 
                }
            };

            const handleSave = async () => {
                if (!form.item || !form.amount) return;
                if (!user) {
                    setTransactions([{ id: Date.now(), ...form, amount: Number(form.amount) }, ...transactions]);
                    setForm({ date: new Date().toISOString().split('T')[0], item: '', amount: '', category: '食費', type: 'expense' });
                    return;
                }
                try {
                    await addDoc(collection(window.db, 'artifacts', window.__app_id || 'js-kakeibo-v1', 'users', user.uid, 'transactions'), {
                        ...form, amount: Number(form.amount), createdAt: new Date().toISOString()
                    });
                    setForm({ date: new Date().toISOString().split('T')[0], item: '', amount: '', category: '食費', type: 'expense' });
                } catch (e) { setError("保存失敗"); }
            };

            const saveApiKey = (val) => {
                const key = val.trim();
                setStoredApiKey(key);
                localStorage.setItem('gemini_api_key', key);
            };

            if (!isReady) return createElement('div', { className: "h-screen flex items-center justify-center bg-white" }, createElement('div', { className: "custom-spinner" }));

            const expSum = transactions.filter(t => t.category !== '振替').reduce((s, t) => s + Number(t.amount), 0);

            return createElement('div', { className: "min-h-screen bg-slate-50 text-slate-800 pb-20 font-sans" },
                createElement('div', { className: "max-w-md mx-auto p-5 space-y-6" },
                    createElement('header', { className: "flex justify-between items-center py-4" },
                        createElement('div', { className: "flex items-center gap-2" },
                            createElement('div', { className: "bg-slate-900 p-2 rounded-xl shadow-lg" }, createElement('i', { 'data-lucide': "wallet", className: "text-white w-5 h-5" })),
                            createElement('h1', { className: "font-black text-xl tracking-tighter" }, "J's Kakeibo")
                        ),
                        createElement('nav', { className: "flex bg-white rounded-xl border border-slate-100 p-1 shadow-sm" },
                            createElement('button', { onClick: () => setActiveTab('home'), className: `px-4 py-1.5 text-[10px] font-black rounded-lg transition-all ${activeTab === 'home' ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400'}` }, "HOME"),
                            createElement('button', { onClick: () => setActiveTab('stats'), className: `px-4 py-1.5 text-[10px] font-black rounded-lg transition-all ${activeTab === 'stats' ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400'}` }, "STATS")
                        )
                    ),
                    
                    activeTab === 'home' ? [
                        createElement('div', { key: 'bal', className: "bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden" },
                            createElement('p', { className: "text-[10px] font-bold opacity-30 uppercase tracking-widest mb-1" }, "Monthly Total"),
                            createElement('p', { className: "text-4xl font-black" }, `¥${expSum.toLocaleString()}`),
                            createElement('div', { className: "absolute top-[-30%] right-[-10%] w-48 h-48 bg-indigo-500/20 rounded-full blur-3xl" })
                        ),
                        
                        createElement('section', { key: 'input', className: "bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm space-y-6 relative" },
                            isAnalyzing && createElement('div', { className: "absolute inset-0 bg-white/95 z-20 flex flex-col items-center justify-center rounded-[2rem] backdrop-blur-sm shadow-inner" },
                                createElement('div', { className: "custom-spinner mb-2" }),
                                createElement('p', { className: "text-[10px] font-black text-slate-400" }, "AI ANALYZING...")
                            ),
                            createElement('div', { className: "flex justify-between items-center px-1" },
                                createElement('span', { className: "text-[10px] font-black text-slate-300 uppercase tracking-widest" }, "Smart Input"),
                                createElement('div', { className: "flex gap-2" },
                                    createElement('button', { onClick: () => camRef.current.click(), className: "p-3 bg-indigo-50 text-indigo-600 rounded-2xl active:scale-95" }, createElement('i', { 'data-lucide': "camera", className: "w-5 h-5" })),
                                    createElement('button', { onClick: () => fileRef.current.click(), className: "p-3 bg-slate-50 text-slate-400 rounded-2xl active:scale-95" }, createElement('i', { 'data-lucide': "upload", className: "w-5 h-5" }))
                                )
                            ),
                            createElement('input', { type: "file", accept: "image/*", capture: "environment", ref: camRef, onChange: onFileChange, className: "hidden" }),
                            createElement('input', { type: "file", accept: "image/*,application/pdf", ref: fileRef, onChange: onFileChange, className: "hidden" }),
                            createElement('div', { className: "space-y-4" },
                                createElement('div', { className: "grid grid-cols-2 gap-3" },
                                    createElement('input', { type: "date", value: form.date, onChange: e => setForm({...form, date: e.target.value}), className: "bg-slate-50 p-3 rounded-2xl text-xs font-bold border-none outline-none" }),
                                    createElement('select', { value: form.category, onChange: e => setForm({...form, category: e.target.value}), className: "bg-slate-50 p-3 rounded-2xl text-xs font-bold border-none outline-none" },
                                        categories.map(c => createElement('option', { key: c, value: c }, c))
                                    )
                                ),
                                createElement('input', { type: "text", placeholder: "買い物項目", value: form.item, onChange: e => setForm({...form, item: e.target.value}), className: "w-full bg-slate-50 p-4 rounded-2xl text-xs font-bold border-none outline-none" }),
                                createElement('div', { className: "relative" },
                                    createElement('span', { className: "absolute left-4 top-4 text-slate-300 font-bold" }, "¥"),
                                    createElement('input', { type: "number", placeholder: "0", value: form.amount, onChange: e => setForm({...form, amount: e.target.value}), className: "w-full bg-slate-50 p-4 pl-9 rounded-2xl text-lg font-black border-none outline-none" })
                                )
                            ),
                            createElement('button', { onClick: handleSave, className: "w-full bg-slate-900 text-white py-4 rounded-[1.5rem] font-black text-xs shadow-xl active:scale-95 transition-all" }, "家計簿を更新する")
                        ),

                        createElement('div', { key: 'history', className: "space-y-3" },
                            transactions.map(t => createElement('div', { key: t.id, className: "bg-white p-5 rounded-[1.5rem] flex justify-between items-center border border-slate-100 shadow-sm" },
                                createElement('div', { className: "flex items-center gap-4" },
                                    createElement('div', { className: "w-1 h-10 rounded-full", style: { backgroundColor: categoryColors[t.category] || '#eee' } }),
                                    createElement('div', null,
                                        createElement('p', { className: "text-xs font-bold text-slate-800" }, t.item),
                                        createElement('p', { className: "text-[9px] text-slate-400 font-bold uppercase" }, `${t.date} • ${t.category}`)
                                    )
                                ),
                                createElement('p', { className: "text-sm font-black" }, `¥${Number(t.amount).toLocaleString()}`)
                            ))
                        )
                    ] : [
                        createElement('div', { key: 'settings', className: "bg-white p-6 rounded-[2rem] border-2 border-indigo-100 shadow-lg space-y-4" }, [
                            createElement('h3', { className: "text-sm font-black flex items-center gap-2 text-indigo-600" }, [
                                createElement('i', { 'data-lucide': "key", className: "w-4 h-4" }),
                                "AI解析のセットアップ"
                            ]),
                            createElement('p', { className: "text-[10px] text-slate-500 leading-relaxed font-bold" }, 
                                "Vercelで使用する場合、取得したAPIキーをここに貼り付けてください。モデル: gemini-1.5-flashを使用します。"
                            ),
                            createElement('input', { 
                                type: "password", 
                                placeholder: "ここにAPIキーをペースト", 
                                value: storedApiKey,
                                onChange: (e) => saveApiKey(e.target.value),
                                className: "w-full bg-slate-50 p-4 rounded-2xl text-xs font-mono border-2 border-slate-100 focus:border-indigo-500 outline-none"
                            }),
                            createElement('p', { className: "text-[9px] text-slate-400" }, 
                                storedApiKey ? "✅ キーが設定されています。" : "⚠️ APIキーを設定してください"
                            )
                        ]),
                        createElement('div', { key: 'info', className: "bg-indigo-50 p-6 rounded-[2rem] border border-indigo-100 mt-4 text-center" }, [
                            createElement('p', { className: "text-[10px] text-indigo-400 font-bold leading-relaxed" }, 
                                "※接続エンドポイントを v1 に最適化しました。"
                            )
                        ])
                    ]
                ),
                error && createElement('div', { className: "fixed bottom-6 left-6 right-6 bg-slate-900 text-white p-4 rounded-2xl text-[10px] font-bold flex justify-between items-center shadow-2xl z-50 border border-white/10" },
                    createElement('div', { className: "flex-1 mr-3" }, error),
                    createElement('i', { 'data-lucide': "x", onClick: () => setError(null), className: "w-4 h-4 opacity-50" })
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(createElement(App));
    </script>
</head>
<body><div id="root"></div></body>
</html>
